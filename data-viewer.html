<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Table Data Viewer</title>
<link rel="stylesheet" href="css/data-viewer.css" />
</head>
<body>
  <header id="toolbar">
    <div class="brand">DB<span>Visualizer</span></div>

    <div class="toolbar-group">
      <label id="import-label" for="file-input" title="Import a .sql dump">
        Import .sql
        <input id="file-input" type="file" accept=".sql,.txt" multiple />
      </label>

      <div id="file-picker" class="hidden">
        <select id="file-select" title="Cached files"></select>
        <button id="btn-remove-file" type="button" title="Remove this file from cache" aria-label="Remove file">×</button>
      </div>
    </div>

    <div class="spacer"></div>

    <a class="nav-link" href="index.html">← Schema Visualizer</a>
  </header>

  <main id="app">
    <aside id="sidebar">
      <div class="sidebar-search">
        <input id="table-search" type="text" placeholder="Filter tables" autocomplete="off" />
      </div>
      <div class="sidebar-title">Tables <span id="table-count">0</span></div>
      <ul id="table-nav"></ul>
    </aside>

    <section id="content">
      <div id="empty-state">
        <p class="empty-title">No file loaded</p>
        <p class="empty-sub">Import a <strong>.sql</strong> dump to browse its tables and rows.</p>
        <button id="empty-import" type="button">Import .sql</button>
      </div>

      <div id="table-view" class="hidden">
        <div id="table-header">
          <h2 id="table-name"></h2>
          <div id="table-tools">
            <div id="table-meta">
              <span id="row-count"></span>
              <span id="col-count"></span>
            </div>
            <button id="btn-export-csv" type="button" title="Export current table as CSV" disabled>Export CSV</button>
          </div>
        </div>

        <div id="table-filters">
          <input id="data-search" type="text" placeholder="Filter rows" />
          <div id="pagination">
            <button id="btn-prev" type="button" title="Previous page" disabled>‹</button>
            <span id="page-info">Page 1 of 1</span>
            <button id="btn-next" type="button" title="Next page" disabled>›</button>
            <select id="page-size" title="Rows per page">
              <option value="25">25 rows</option>
              <option value="50" selected>50 rows</option>
              <option value="100">100 rows</option>
              <option value="500">500 rows</option>
            </select>
          </div>
        </div>

        <div id="grid-wrapper">
          <table id="data-grid">
            <thead><tr id="grid-head"></tr></thead>
            <tbody id="grid-body"></tbody>
          </table>
        </div>

        <div id="table-footer">
          <span id="showing-info"></span>
        </div>
      </div>
    </section>
  </main>

  <script src="js/sql-data-parser.js"></script>
  <script src="js/data-viewer.js"></script>
</body>
</html>
